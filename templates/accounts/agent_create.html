{% extends 'base.html' %}
{% block title %}Create Agent{% endblock %}

{% block content %}
<style>
    .form-card{background:#fff;padding:25px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.1);max-width:700px}
    .form-group{margin-bottom:15px}
    label{font-weight:bold;display:block;margin-bottom:5px}
    input{width:100%;padding:10px;border-radius:6px;border:1px solid #ccc}
    .btn{padding:10px 15px;border-radius:6px;border:none;cursor:pointer}
    .btn-save{background:#2563eb;color:#fff}
    .btn-back{background:#374151;color:#fff;text-decoration:none;display:inline-block}
    .error{color:#b91c1c;margin:8px 0}
</style>

<div style="display:flex;justify-content:space-between;align-items:center;max-width:700px;margin-bottom:12px;">
    <h2 style="margin:0;">Create Agent</h2>
    <a class="btn btn-back" href="{% url 'agent-list' %}">Back</a>
</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<div class="form-card">
<form method="post">
{% csrf_token %}

<div class="form-group">
    <label>Full Name</label>
    <input type="text" name="full_name" value="{{ form.full_name|default:'' }}">
</div>

<div class="form-group">
    <label>Phone</label>
    <input type="text" name="phone" value="{{ form.phone|default:'' }}">
</div>

<div class="form-group">
    <label>Email</label>
    <input type="email" name="email" value="{{ form.email|default:'' }}">
</div>

<div class="form-group">
    <label>City</label>
    <input type="text" name="city" value="{{ form.city|default:'' }}">
</div>

<div class="form-group">
    <label>Address</label>
    <input type="text" name="address" value="{{ form.address|default:'' }}">
</div>

<div class="form-group">
    <label>Specialization</label>
    <input type="text" name="specialization" value="{{ form.specialization|default:'' }}">
</div>

<div class="form-group">
    <label>Assign Property</label>
    <select name="property_id" required>
        <option value="">-- Select Property --</option>
        {% for p in properties %}
            <option value="{{ p.id }}" {% if form.property_id == p.id|stringformat:"s" %}selected{% endif %}>
                {{ p.title }}
            </option>
        {% endfor %}
    </select>
</div>

<div class="form-group">
    <label>Username</label>
    <input type="text" name="username" value="{{ form.username|default:'' }}" required>
</div>

<div class="form-group">
    <label>Password</label>
    <input type="password" name="password" required>
</div>

<button class="btn btn-save" type="submit">Create Agent</button>
</form>
</div>
{% endblock %}
