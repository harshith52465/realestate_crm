<!DOCTYPE html>
<html>
<head>
    <title>Customer Register</title>
    <style>
        body {
            font-family: Arial;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box {
            background:white;
            padding:30px;
            border-radius:8px;
            width:350px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width:100%;
            padding:10px;
            margin:6px 0;
        }

        button {
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
        }

        a {
            display:block;
            text-align:center;
            margin-top:10px;
        }
    </style>
</head>

<body>
<div class="box">

<h2>Create Account</h2>

{% if error %}
<div style="color:#b91c1c; margin:8px 0;">{{ error }}</div>
{% endif %}

<form method="post">
{% csrf_token %}

<input name="full_name" placeholder="Full Name" value="{{ form.full_name|default:'' }}">
<input name="phone" placeholder="Phone Number" value="{{ form.phone|default:'' }}">
<input name="email" placeholder="Email" value="{{ form.email|default:'' }}">
<input name="city" placeholder="City" value="{{ form.city|default:'' }}">
<input name="address" placeholder="Address" value="{{ form.address|default:'' }}">

<input name="username" placeholder="Username" value="{{ form.username|default:'' }}">
<input name="password" type="password" placeholder="Password">

<button type="submit">Register</button>

</form>

<a href="{% url 'login' %}">Already have account? Login</a>

</div>
</body>
</html>
