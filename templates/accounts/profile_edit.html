{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}

{% block content %}

<style>
    .form-card {
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        max-width: 700px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #555;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .btn {
        margin-top: 15px;
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .btn-save {
        background: #2563eb;
        color: white;
    }

    .btn-cancel {
        background: #e5e7eb;
        color: #111;
        text-decoration: none;
        margin-left: 10px;
        padding: 10px 16px;
        border-radius: 6px;
    }
</style>

<h2>Edit Profile</h2>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>First Name</label>
            <input type="text" name="first_name" value="{{ request.user.first_name }}">
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" value="{{ request.user.last_name }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ request.user.email }}">
        </div>

        {% if profile %}
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ profile.phone }}">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option value="">Select</option>
                <option value="male" {% if profile.gender == 'male' %}selected{% endif %}>Male</option>
                <option value="female" {% if profile.gender == 'female' %}selected{% endif %}>Female</option>
                <option value="other" {% if profile.gender == 'other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" value="{{ profile.dob }}">
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address">{{ profile.address }}</textarea>
        </div>
        {% endif %}

        <button type="submit" class="btn btn-save">Save Changes</button>
        <a href="{% url 'profile' %}" class="btn-cancel">Cancel</a>
    </form>
</div>

{% endblock %}
