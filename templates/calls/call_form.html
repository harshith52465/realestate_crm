{% extends 'base.html' %}
{% block title %}Add Call{% endblock %}

{% block content %}
<style>
    .form-card{background:#fff;padding:25px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.1);max-width:700px}
    .form-group{margin-bottom:15px}
    label{font-weight:bold;display:block;margin-bottom:5px}
    input,select,textarea{width:100%;padding:10px;border-radius:6px;border:1px solid #ccc}
    .btn{padding:10px 15px;border-radius:6px;border:none;cursor:pointer}
    .btn-save{background:#2563eb;color:#fff}
</style>

<h2>Add Call</h2>

<div class="form-card">
<form method="post">
{% csrf_token %}

<div class="form-group">
    <label>Lead</label>
    <select name="lead_id">
        <option value="">-- Select Lead --</option>
        {% for l in leads %}
            <option value="{{ l.id }}">{{ l.name }}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group">
    <label>Call Type</label>
    <select name="call_type" required>
        <option value="ivr">IVR</option>
        <option value="incoming">Incoming</option>
        <option value="outgoing">Outgoing</option>
        <option value="missed">Missed</option>
    </select>
</div>

<div class="form-group">
    <label>Duration (seconds)</label>
    <input type="number" name="duration_seconds" min="0">
</div>

<div class="form-group">
    <label>Notes</label>
    <textarea name="notes" rows="3"></textarea>
</div>

<button class="btn btn-save" type="submit">Save Call</button>
</form>
</div>
{% endblock %}
